<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QA Presentation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        :root{
            --bg:#050816;
            --panel:#10172A;
            --text:#F5F5F5;
            --muted:#A0A8C0;
            --violet:#8EA4FF;
            --cyan:#61E6D8;
            --rose:#FF6F84;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body,#root{
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{
            background:
                    radial-gradient(circle at top,#13203f 0%,#050816 50%);
            font-family:'Inter',sans-serif;
            color:white;
        }

        .display{
            font-family:'Space Grotesk',sans-serif;
            font-weight:700;
            letter-spacing:-0.05em;
        }

        .slide-enter{
            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .panel{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(14px);
            box-shadow:0 20px 50px rgba(0,0,0,0.5);
        }

        .hero-glow{
            position:absolute;
            width:700px;
            height:700px;
            border-radius:50%;
            background:radial-gradient(circle,rgba(142,164,255,0.18),transparent 70%);
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            filter:blur(30px);
        }

        .grid-bg{
            position:absolute;
            inset:0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
            background-size:100px 100px;
            mask-image:radial-gradient(circle at center,black 40%,transparent 90%);
        }

        .btn{
            padding:14px 28px;
            border-radius:999px;
            border:none;
            background:linear-gradient(45deg,#8EA4FF,#61E6D8);
            color:black;
            font-weight:600;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div id="root"></div>

<script type="text/babel" src="deck-icons.jsx"></script>
<script type="text/babel" src="deck-chrome.jsx"></script>
<script type="text/babel" src="deck-slides.jsx"></script>
<script type="text/babel" src="deck-app.jsx"></script>

</body>

</html>
