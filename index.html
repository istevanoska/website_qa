<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>QA Project - FINKI x G+D Netcetera</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        :root{
            --bg:#040816;
            --text:#F8FAFC;
            --muted:#94A3B8;
            --blue:#8EA4FF;
            --cyan:#61E6D8;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body,
        #root{
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{

            background:
                    radial-gradient(
                            circle at top,
                            #15203a 0%,
                            #040816 55%
                    );

            color:white;

            font-family:'Inter',sans-serif;

        }

        .display{

            font-family:'Space Grotesk',sans-serif;

            font-weight:700;

            letter-spacing:-0.05em;

            word-break:break-word;

        }

        .glass{

            background:
                    linear-gradient(
                            180deg,
                            rgba(255,255,255,0.08),
                            rgba(255,255,255,0.03)
                    );

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(25px);

            box-shadow:
                    inset 0 1px 0 rgba(255,255,255,0.06),
                    0 30px 80px rgba(0,0,0,0.45);

        }

        .hero-glow{

            position:absolute;

            width:450px;
            height:450px;

            border-radius:50%;

            background:
                    radial-gradient(
                            circle,
                            rgba(142,164,255,0.20),
                            transparent 70%
                    );

            left:50%;
            top:50%;

            transform:translate(-50%,-50%);

            filter:blur(30px);

        }

        .grid{

            position:absolute;

            inset:0;

            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);

            background-size:140px 140px;

            mask-image:
                    radial-gradient(circle at center,black 40%,transparent 90%);

        }

        .particle{

            position:absolute;

            border-radius:999px;

            background:
                    radial-gradient(
                            circle,
                            rgba(255,255,255,0.9),
                            rgba(255,255,255,0)
                    );

            opacity:0.7;

            filter:blur(1px);

            animation:float linear infinite;

        }

        @keyframes float{

            from{
                transform:translateY(100vh);
            }

            to{
                transform:translateY(-120vh);
            }

        }

        .slide{
            animation:fade 1s ease;
        }

        @keyframes fade{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .btn{

            width:20px;
            height:20px;

            border-radius:50%;

            border:1px solid rgba(255,255,255,0.08);

            background:
                    linear-gradient(
                            180deg,
                            rgba(255,255,255,0.08),
                            rgba(255,255,255,0.03)
                    );

            backdrop-filter:blur(20px);

            color:white;

            cursor:pointer;

            font-size:26px;

            transition:0.35s;

            box-shadow:
                    inset 0 1px 0 rgba(255,255,255,0.08),
                    0 10px 40px rgba(0,0,0,0.35);

        }

        .btn:hover{

            transform:translateY(-3px);

            border-color:rgba(97,230,216,0.35);

            box-shadow:
                    0 0 30px rgba(97,230,216,0.15),
                    inset 0 1px 0 rgba(255,255,255,0.1);

        }

    </style>

</head>

<body>

<div id="root"></div>

<script type="text/babel" src="deck-icons.jsx"></script>
<script type="text/babel" src="deck-chrome.jsx"></script>
<script type="text/babel" src="deck-slides.jsx"></script>
<script type="text/babel" src="deck-app.jsx"></script>

</body>

</html>
